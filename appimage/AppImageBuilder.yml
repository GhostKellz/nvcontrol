version: 1

AppDir:
  path: ./AppDir

  app_info:
    id: com.github.nvcontrol
    name: nvcontrol
    icon: nvcontrol
    version: 0.8.7
    exec: usr/bin/nvcontrol
    exec_args: $@

  apt:
    arch: amd64
    sources:
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ noble main restricted universe multiverse'

    include:
      - nvidia-utils-590
      - libwayland-client0
      - libxcb1

  files:
    include:
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so*
      - /usr/lib/x86_64-linux-gnu/libcuda.so*
      - /usr/lib/x86_64-linux-gnu/libwayland-client.so*
      - /usr/lib/x86_64-linux-gnu/libxkbcommon.so*
    exclude:
      - usr/share/man
      - usr/share/doc

  runtime:
    env:
      LD_LIBRARY_PATH: '${APPDIR}/usr/lib/x86_64-linux-gnu:${APPDIR}/usr/lib:${LD_LIBRARY_PATH}'
      PATH: '${APPDIR}/usr/bin:${PATH}'

  test:
    debian:
      image: ubuntu:24.04
      command: ./AppRun --help

AppImage:
  arch: x86_64
  update-information: guess
  sign-key: None
